{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}Electronics Shop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="pb-3 mb-3 border-bottom">
            <a href="/" class="text-dark text-decoration-none h3">Electronics Shop</a>
            <div class="float-end">
                <a href="{% url 'cart:cart_detail' %}" class="btn btn-outline-secondary">
                    🛒 Корзина ({{ cart|length }})
                </a>
                {% if user.is_authenticated %}
                    <span class="ms-2">Привет, {{ user.username }}!</span>
                    <form action="{% url 'accounts:logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link">Выйти</button>
                    </form>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="btn btn-link">Войти</a>
                    <a href="{% url 'accounts:register' %}" class="btn btn-link">Регистрация</a>
                {% endif %}
            </div>
        </div>
        <div id="content">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
