{% extends "base.html" %}
{% block title %}{{ product.name }}{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        {% if product.image %}
            <img src="{{ product.image.url }}" class="img-fluid">
        {% else %}
            <div class="bg-light text-center py-5">Нет фото</div>
        {% endif %}
    </div>
    <div class="col-md-6">
        <h1>{{ product.name }}</h1>
        <p class="price h4">{{ product.price }} руб.</p>
        <form action="{% url 'cart:cart_add' product.id %}" method="post">
            {{ cart_product_form }}
            {% csrf_token %}
            <input type="submit" value="Добавить в корзину" class="btn btn-primary mt-2">
        </form>
        <p class="mt-3">{{ product.description|linebreaks }}</p>
    </div>
</div>
{% endblock %}
